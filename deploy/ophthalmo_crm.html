<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Deep Diagnostic</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body style="margin:0;background:#13121f;color:#fff;font-family:sans-serif;">
  <div id="diag-log" style="padding:20px;font-size:12px;color:#94a3b8;border-bottom:1px solid #333;">Diagnostic Mode Active...</div>
  <div id="root"></div>

  <script>
    function log(msg) {
      document.getElementById('diag-log').innerHTML += '<br/>• ' + msg;
      console.log(msg);
    }
    log("Main script loaded");
    window.onerror = function(m, u, l) { log("GLOBAL ERROR: " + m + " at " + l); };
  </script>

  <script type="text/babel">
    log("Babel script evaluation started");
    try {
      const { useState, useEffect } = React;
      log("React hooks destructuring: OK");

      function App() {
        log("App component initial rendering...");
        return (
          <div style={{ padding: 40, textAlign: 'center' }}>
            <h1 style={{ color: '#7c3aed' }}>DIAGNOSTIC SUCCESS</h1>
            <p>If you see this, the component logic is fine.</p>
          </div>
        );
      }

      const rootEl = document.getElementById('root');
      if (!rootEl) {
        log("ERROR: Root element not found!");
      } else {
        log("Root element found. Rendering...");
        ReactDOM.createRoot(rootEl).render(<App />);
        log("Render command sent.");
      }
    } catch (e) {
      log("CATCH ERROR: " + e.message);
    }
  </script>
</body>
</html>
