name: Deploy MedEye TMA

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Sync build to deploy folder
      run: |
        rm -rf deploy/dist
        cp -r dist deploy/dist

    - name: Pre-deploy code snapshot
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p /root/app/backups/code_snapshots
          # Сохраняем только последние 5 архивов кода, чтобы не занимать место
          cd /root/app/backups/code_snapshots && ls -t | tail -n +6 | xargs rm -rf --
          # Создаем новый снимок текущего кода
          tar -czf /root/app/backups/code_snapshots/code_pre_deploy_$(date +%Y%m%d_%H%M%S).tar.gz -C /root medeye_bot --exclude=__pycache__ --exclude=venv --exclude=*.db --exclude=*.log

    - name: Deploy to Server via rsync
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.SERVER_IP }}
        REMOTE_USER: ${{ secrets.SERVER_USER }}
        TARGET: /root/medeye_bot/
        SOURCE: "deploy/"
        ARGS: "-av --delete --checksum --exclude='*.db' --exclude='*.log' --exclude='__pycache__/'"

    - name: Sync to medeye/api and restart services
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          rsync -av --delete --exclude='*.db' --exclude='*.log' --exclude='__pycache__/' /root/medeye_bot/ /root/medeye/api/
          systemctl restart medeye-app || true
          systemctl restart medeye || true
          systemctl restart medeye-bot || true
